# LLM Proxy Configuration
# Copy this file to config.yaml and modify as needed

server:
  port: 4000
  host: 0.0.0.0

database:
  path: ./data/llm_proxy.db
  retention_days: 90

admin:
  # Choose one of the following authentication methods:
  
  # Option 1: Basic Auth (username/password)
  username: admin
  password: change_me_to_secure_password
  
  # Option 2: API Key (set X-Admin-Key header)
  # api_key: change_me_to_secure_api_key

models:
  - name: qwen-2.5-7b
    upstream: http://localhost:3000/v1/chat/completions
    cost_per_1k_input: 0.001
    cost_per_1k_output: 0.002
    
  - name: qwen-2.5-32b
    upstream: http://localhost:3001/v1/chat/completions
    cost_per_1k_input: 0.002
    cost_per_1k_output: 0.004

  # Example with scale-to-zero enabled:
  # - name: qwen-2.5-7b
  #   upstream: http://sglang:3000/v1/chat/completions
  #   cost_per_1k_input: 0.001
  #   cost_per_1k_output: 0.002
  #   scale_to_zero:
  #     enabled: true
  #     container_name: sglang  # Docker container name to control
  #     idle_timeout_minutes: 30  # Stop after N minutes of inactivity
  #     start_timeout_seconds: 120  # Max time to wait for container to start
  #     health_check_path: /health  # Endpoint to check if backend is ready
  #     health_check_interval_ms: 2000  # How often to check health during startup

rate_limits:
  default:
    requests_per_minute: 60
    tokens_per_minute: 100000
