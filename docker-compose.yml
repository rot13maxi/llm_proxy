version: '3.8'

services:
  llm-proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "4000:4000"
      - "9090:9090"
    volumes:
      - ./data:/data
      - ./config.yaml:/config.yaml:ro
    environment:
      - DATABASE_PATH=/data/llm_proxy.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
