# LLM Proxy Configuration
# Configured to match litellm setup for parallel testing

server:
  port: 4000
  host: 0.0.0.0

database:
  path: /data/llm_proxy.db
  retention_days: 90

admin:
  # Choose one of the following authentication methods:
  
  # Option 1: Basic Auth (username/password)
  username: admin
  password: pass1234
  
  # Option 2: API Key (set X-Admin-Key header)
  # api_key: change_me_to_secure_api_key

models:
  # Primary model — use this name in API calls
  # Costs are per 1000 tokens (matching litellm's per-token costs × 1000)
  - name: qwen3.5-27b
    upstream: http://sglang-27b:8001/v1/chat/completions
    cost_per_1k_input: 0.000195
    cost_per_1k_output: 0.00156
    
  - name: qwen3.5-122b-a10b
    upstream: http://sglang:8000/v1/chat/completions
    cost_per_1k_input: 0.00026
    cost_per_1k_output: 0.00208

